name: Daily Obsidian News

on:
  schedule:
    # 00:00 UTC = 08:00 Asia/Shanghai
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-news:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate daily news
        run: python3 daily_news_digest_cloud.py

      - name: Commit generated news
        run: |
          git config user.name "daily-news-bot"
          git config user.email "daily-news-bot@users.noreply.github.com"
          git add output
          git commit -m "Daily news $(TZ=Asia/Shanghai date +%F)" || echo "No changes to commit"
          git pull --rebase origin main
          git push

      - name: Purge jsDelivr cache
        run: |
          curl -fsS "https://purge.jsdelivr.net/gh/sunsteven7/obsidian-daily-news@main/output/latest-daily-section.md" || true
          curl -fsS "https://purge.jsdelivr.net/gh/sunsteven7/obsidian-daily-news@main/output/latest-news.md" || true
          curl -fsS "https://purge.jsdelivr.net/gh/sunsteven7/obsidian-daily-news@main/output/latest-date.txt" || true
